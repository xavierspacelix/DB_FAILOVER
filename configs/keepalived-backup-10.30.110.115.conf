# Keepalived 2.2.8 — Node B (10.30.110.115) — BACKUP
# Referensi: https://www.keepalived.org/documentation/keepalived-conf/
# Catatan: VRRP authentication (PASS) dihapus di Keepalived 2.2.x

global_defs {
    router_id PGHA_B
    enable_script_security
}

vrrp_script check_haproxy {
    script "/usr/bin/killall -0 haproxy"
    interval 2
    weight 2
    fall 2
    rise 2
}

vrrp_instance VI_PG {
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 100
    advert_int 1
    virtual_ipaddress {
        10.30.110.112/24
    }
    track_script {
        check_haproxy
    }
    notify_master "/usr/bin/systemctl reload haproxy"
}
