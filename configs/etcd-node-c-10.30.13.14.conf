# etcd Node C (10.30.13.14) — etcd3
# Referensi: https://etcd.io/docs/v3.6/op-guide/configuration/

ETCD_NAME=etcd3
ETCD_DATA_DIR=/var/lib/etcd/default.etcd

# Peer (cluster internal) communication
ETCD_LISTEN_PEER_URLS=http://10.30.13.14:2380
ETCD_INITIAL_ADVERTISE_PEER_URLS=http://10.30.13.14:2380

# Client-facing
ETCD_LISTEN_CLIENT_URLS=http://10.30.13.14:2379,http://127.0.0.1:2379
ETCD_ADVERTISE_CLIENT_URLS=http://10.30.13.14:2379

# Cluster bootstrapping
ETCD_INITIAL_CLUSTER=etcd1=http://10.30.13.13:2380,etcd2=http://10.30.13.12:2380,etcd3=http://10.30.13.14:2380
ETCD_INITIAL_CLUSTER_STATE=new
ETCD_INITIAL_CLUSTER_TOKEN=pg-etcd-cluster

# Performance tuning — etcd v3.6+
ETCD_QUOTA_BACKEND_BYTES=8589934592        # 8 GB
ETCD_MAX_SNAPSHOTS=5
ETCD_MAX_WALS=5

# Heartbeat and election — default timing
ETCD_HEARTBEAT_INTERVAL=100                 # ms
ETCD_ELECTION_TIMEOUT=1000                  # ms

# Auto-compaction — v3.6 periodic by default
ETCD_AUTO_COMPACTION_MODE=periodic
ETCD_AUTO_COMPACTION_RETENTION=24h
