# Patroni 4.1.3 — Node D (10.30.110.128) — Leader dengan data existing
# Referensi: https://patroni.readthedocs.io/en/latest/yaml_configuration.html
#
# CATATAN: Node ini sudah punya database existing.
# Patroni akan mendeteksi data di data_dir dan mengadopsinya (bukan buat baru).

scope: pg_cluster
namespace: /db/
name: node-d

restapi:
    listen: 10.30.110.128:8008
    connect_address: 10.30.110.128:8008

etcd3:
    hosts:
        - 10.30.110.114:2379
        - 10.30.110.115:2379
        - 10.30.110.116:2379

bootstrap:
    dcs:
        ttl: 30
        loop_wait: 10
        retry_timeout: 10
        maximum_lag_on_failover: 1048576
        postgresql:
            use_pg_rewind: true
            parameters:
                max_connections: 200
                max_prepared_transactions: 0
                wal_level: replica
                hot_standby: "on"
                max_wal_senders: 10
                max_replication_slots: 10
                wal_log_hints: "on"
                shared_buffers: 256MB

    # initdb TIDAK digunakan — data sudah ada
    # users TIDAK digunakan — user sudah ada di DB existing

    pg_hba:
        - host replication replicator 10.30.110.0/24 md5
        - host all groupware 10.30.110.0/24 md5
        - host all postgres 127.0.0.1/32 trust

postgresql:
    listen: 10.30.110.128:5432
    connect_address: 10.30.110.128:5432
    data_dir: /var/lib/pgsql/16/data
    bin_dir: /usr/pgsql-16/bin
    pgpass: /tmp/pgpass
    authentication:
        replication:
            username: replicator
            password: replicator_pass
        superuser:
            username: postgres
            password: postgres_pass
        rewind:
            username: rewind_user
            password: rewind_pass
    parameters:
        unix_socket_directories: /var/run/postgresql

tags:
    nofailover: false
    noloadbalance: false
    clonefrom: false
    nosync: false
